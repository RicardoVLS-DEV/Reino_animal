<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador del Reino Animal 🐾</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="notebook">

        <!-- Lomo cosido decorativo -->
        <div class="spine" aria-hidden="true"></div>

        <header class="top-bar">
            <div id="weatherWidget">🌍 Cargando clima local...</div>
            <button id="themeToggle" class="theme-btn" type="button">🌙 Modo Oscuro</button>
        </header>

        <main>
            <div class="cover">
                <p class="eyebrow">Cuaderno de campo · Archivo de fauna</p>
                <h1>Buscador del Reino Animal <span class="paw">🐾</span></h1>
                <p class="lede">Busca perros/gatos en inglés o cualquier otro animal en español.</p>
            </div>

            <div class="search-box">
                <select id="petType">
                    <option value="cat">Gato 🐱</option>
                    <option value="dog">Perro 🐶</option>
                    <option value="animal">Otro Animal 🦁</option>
                </select>

                <input type="text" id="breedInput" placeholder="Escribe un animal...">
                <button id="searchBtn" type="button">Buscar</button>
            </div>

            <div id="result"></div>
        </main>

        <footer class="page-footer">
            <span>Archivo digital de fauna</span>
            <span class="dot" aria-hidden="true">•</span>
            <span>Datos vía TheCatAPI, TheDogAPI y Wikipedia</span>
        </footer>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
